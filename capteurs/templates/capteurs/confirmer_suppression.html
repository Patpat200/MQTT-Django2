{% extends 'capteurs/base.html' %}
{% block content %}
<div class="alert alert-danger">
    <h4>⚠️ Confirmer la suppression</h4>
    <p>Supprimer <strong>{{ capteur.nom_capteur }}</strong> (<code>{{ capteur.id_capteur }}</code>) ?</p>
    <p class="text-muted">Toutes les mesures associées seront supprimées (CASCADE).</p>
    <form method="post">
        {% csrf_token %}
        <a href="/" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-danger ms-2">Confirmer</button>
    </form>
</div>
{% endblock %}
