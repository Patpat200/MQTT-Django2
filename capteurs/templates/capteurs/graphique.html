{% extends 'capteurs/base.html' %}
{% block content %}
<h2>Graphique — {{ capteur.nom_capteur }}</h2>
<a href="/capteur/{{ capteur.id_capteur }}/" class="btn btn-secondary mb-3">← Retour</a>

<canvas id="graph" height="120"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    var labels = {{ labels|safe }};
    var valeurs = {{ valeurs|safe }};
    var zoneDeDessin = document.getElementById('graph');

    new Chart(zoneDeDessin, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Température (°C)',
                data: valeurs,
                borderColor: 'rgba(255,99,132,1)',
                backgroundColor: 'rgba(255,99,132,0.1)',
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true
        }
    });
</script>
{% endblock %}
